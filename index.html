<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紙餐盒勇者試煉完整版</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.wrap{padding:12px}
.card{background:#fff;color:#111;border-radius:16px;padding:12px}
.choice{display:block;width:100%;margin:6px 0;padding:10px;border:none;border-radius:10px}
.correct{background:#bbf7d0} .wrong{background:#fecaca}
.btn{width:100%;padding:12px;border:none;border-radius:999px;background:#22c55e;color:#fff;font-weight:bold;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<h2>🛡️ 紙餐盒勇者試煉</h2>
<div class="card">
<div id="stage"></div>
<div id="hero"></div>
<div id="enemy"></div>
<div id="q"></div>
<div id="choices"></div>
<button class="btn" onclick="next()">下一關</button>
</div>
</div>

<script>
const data = [{"stageTitle": "第一關｜油污危機", "area": "你來到便當村，油污怪正在污染餐盒。", "type": "油污判斷", "icon": "🍱", "hero": "勇者：這些餐盒還能回收嗎？", "enemy": "油污怪：哈哈！我已經讓它變得無法回收了！", "question": "回收前第一步？", "choices": [{"key": "A", "text": "直接丟"}, {"key": "B", "text": "清除殘渣"}, {"key": "C", "text": "壓扁"}], "answer": "B", "tip": "需先清除殘渣"}, {"stageTitle": "第二關｜分類試煉", "area": "分類神殿守門人出現。", "type": "流程", "icon": "🍱", "hero": "勇者：讓我證明我會分類！", "enemy": "守門人：選錯就無法通過！", "question": "乾淨紙餐盒應？", "choices": [{"key": "A", "text": "一般垃圾"}, {"key": "B", "text": "紙容器回收"}, {"key": "C", "text": "紙類回收"}], "answer": "B", "tip": "有特殊膠膜需以紙容器回收"}, {"stageTitle": "第三關｜危機判斷", "area": "外送驛站被油污籠罩。", "type": "分類", "icon": "🍱", "hero": "勇者：這種狀況要判斷！", "enemy": "油污：你分得清嗎？", "question": "少量油漬的紙餐盒該如何處理？", "choices": [{"key": "A", "text": "直接回收"}, {"key": "B", "text": "沖洗後紙容器回收"}, {"key": "C", "text": "一般垃圾"}], "answer": "B", "tip": "應去除油污避免影響回收品質"}, {"stageTitle": "第四關｜觀念挑戰", "area": "圖書館出現知識之靈。", "type": "判斷", "icon": "🍱", "hero": "勇者：我要理解原因！", "enemy": "知識之靈：答對才是真懂！", "question": "餐盒為何不能當作紙類回收", "choices": [{"key": "A", "text": "太重"}, {"key": "B", "text": "餐盒有塑膠淋膜需特殊處理"}, {"key": "C", "text": "沒價值"}], "answer": "B", "tip": "紙餐盒塑膠淋膜需特殊處理"}, {"stageTitle": "第五關｜分離試煉", "area": "分類站出現分離獸。", "type": "觀念", "icon": "🍱", "hero": "勇者：不同材質要分開！", "enemy": "分離獸：混在一起就完了！", "question": "餐盒與塑膠蓋應如何回收？", "choices": [{"key": "A", "text": "一起回收"}, {"key": "B", "text": "分開回收"}, {"key": "C", "text": "丟一般垃圾"}], "answer": "B", "tip": "材質不同需分開處理"}, {"stageTitle": "第六關｜清潔任務", "area": "你進入清潔工坊，殘渣魔四處散落。", "type": "流程", "icon": "🍱", "hero": "勇者：要先處理這些殘渣！", "enemy": "殘渣魔：不清理我，你就失敗了！", "question": "裝湯紙盒應？", "choices": [{"key": "A", "text": "紙類回收"}, {"key": "B", "text": "沖水後紙容器回收"}, {"key": "C", "text": "一般垃圾"}], "answer": "B", "tip": "去除油污才能回收"}, {"stageTitle": "第七關｜入侵危機", "area": "發霉蟲入侵回收聖地。", "type": "判斷", "icon": "🍱", "hero": "勇者：不能讓發霉蟲污染回收！", "enemy": "發霉蟲：看我讓你們沒辦法正常回收！", "question": "紙餐盒放太久發霉發臭怎麼處理?", "choices": [{"key": "A", "text": "紙容器回收"}, {"key": "B", "text": "丟一般垃圾"}, {"key": "C", "text": "紙類回收"}], "answer": "B", "tip": "過度油污發霉發臭無法回收屬於一般垃圾"}, {"stageTitle": "第八關｜宣傳任務", "area": "要如何將回收理念分享給每一位勇者。", "type": "情境", "icon": "🍱", "hero": "勇者：你願意加入回收勇者行列嗎?", "enemy": "紙餐盒怪：可惡勇者變多我要被回收了!", "question": "家人說便當紙盒直接丟一般垃圾怎麼辦?", "choices": [{"key": "A", "text": "跟著丟一般垃圾"}, {"key": "B", "text": "解釋倒乾淨可以紙容器回收"}, {"key": "C", "text": "當作紙類回收"}], "answer": "B", "tip": "要記得提醒家人一起做好紙容器回收"}, {"stageTitle": "第九關｜公司任務", "area": "武器站選擇勇者的武器。", "type": "情境", "icon": "🍱", "hero": "勇者：該如何減少紙餐盒？", "enemy": "守衛：挑選屬於勇者的減量武器！", "question": "外帶早餐可以如何減少垃圾量?", "choices": [{"key": "A", "text": "使用塑膠袋"}, {"key": "B", "text": "自備環保餐盒"}, {"key": "C", "text": "索取竹筷塑膠湯匙"}], "answer": "B", "tip": "自備循環餐盒可減少垃圾量"}, {"stageTitle": "最終關｜勇者試煉", "area": "你來到最終聖殿，環保之王現身。", "type": "綜合", "icon": "🍱", "hero": "勇者：我已擁有環保之力", "enemy": "環保之王：請讓我看看你所得到的力量！", "question": "勇者可以如何用回收保護地球?", "choices": [{"key": "A", "text": "增加污染"}, {"key": "B", "text": "減少垃圾落實資源循環"}, {"key": "C", "text": "可以侵占動物生存空間"}], "answer": "B", "tip": "讓資源循環再利用減少垃圾產生"}];
let i=0;

function render(){
 let s=data[i];
 document.getElementById("stage").innerText=s.stageTitle;
 document.getElementById("hero").innerText=s.hero;
 document.getElementById("enemy").innerText=s.enemy;
 document.getElementById("q").innerText=s.question;
 let box=document.getElementById("choices");
 box.innerHTML="";
 s.choices.forEach(c=>{
  let b=document.createElement("button");
  b.className="choice";
  b.innerText=c.key+"."+c.text;
  b.onclick=()=>{
    if(c.key===s.answer){b.classList.add("correct");alert("正確："+s.tip)}
    else{b.classList.add("wrong");alert("錯誤 正解："+s.answer)}
  };
  box.appendChild(b);
 });
}

function next(){
 i++;
 if(i>=data.length){alert("完成冒險！");i=0}
 render();
}

render();
</script>
</body>
</html>
