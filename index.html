<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紙餐盒RPG（最終版）</title>
<style>
  body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
  .wrap{padding:12px}
  .title{font-size:20px;font-weight:900;margin-bottom:6px}
  .sub{opacity:.8;margin-bottom:10px}
  .hud{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .chip{background:#111827;border:1px solid #374151;border-radius:999px;padding:4px 8px;font-size:12px}
  .card{background:#fff;color:#111;border-radius:16px;padding:12px}
  .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .bubble{background:#eef2ff;border-radius:12px;padding:8px;margin:6px 0}
  .enemy{background:#fee2e2}
  .question{font-size:18px;font-weight:700;margin:10px 0}
  .choices{display:grid;gap:8px}
  .choice{display:flex;gap:8px;align-items:center;border:none;border-radius:12px;padding:10px;background:#f1f5f9}
  .choice.correct{background:#bbf7d0}
  .choice.wrong{background:#fecaca}
  .meta .code{font-size:12px;opacity:.7}
  .meta .label{font-size:14px}
  .btn{width:100%;border:none;border-radius:999px;padding:12px;margin-top:8px;background:#22c55e;color:#fff;font-weight:900}
  .feedback{margin-top:8px;padding:8px;border-radius:12px;display:none}
  .feedback.show{display:block}
  .good{background:#dcfce7}
  .bad{background:#fee2e2}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">🛡️ 紙餐盒勇者試煉</div>
  <div class="sub">踏上分類試煉，成為環保勇者</div>

  <div class="hud">
    <span class="chip" id="stageText">🗺️</span>
    <span class="chip">❤️ <span id="lifeText">5</span></span>
    <span class="chip">⭐ <span id="scoreText">0</span></span>
  </div>

  <div class="card">
    <div class="row">
      <div id="sceneName"></div>
      <div id="sceneIcon"></div>
    </div>

    <div class="bubble" id="heroBubble"></div>
    <div class="bubble enemy" id="enemyBubble"></div>

    <div class="question" id="questionText"></div>
    <div class="choices" id="choicesBox"></div>

    <div class="feedback" id="feedbackBox"></div>
    <button class="btn" id="nextBtn" style="display:none">下一關 ➜</button>
  </div>
</div>

<script>
const STAGES = [{"stageTitle": "第一關｜油污危機", "area": "你來到便當村，油污怪正在污染餐盒。", "type": "油污判斷", "icon": "🍱", "hero": "勇者：這些餐盒還能回收嗎？", "enemy": "油污怪：哈哈！我已經讓它變得無法回收了！", "question": "紙餐盒沾滿油污應如何處理？", "choices": [{"key": "A", "text": "紙類回收"}, {"key": "B", "text": "沖水後紙容器回收"}, {"key": "C", "text": "一般垃圾"}], "answer": "B", "tip": "應沖洗乾淨後回收"}, {"stageTitle": "第二關｜清潔試煉", "area": "你進入清潔工坊，殘渣魔四處散落。", "type": "流程", "icon": "🧽", "hero": "勇者：要先處理這些殘渣！", "enemy": "殘渣魔：不清理我，你就失敗了！", "question": "回收前第一步？", "choices": [{"key": "A", "text": "直接丟"}, {"key": "B", "text": "清除殘渣"}, {"key": "C", "text": "壓扁"}], "answer": "B", "tip": "需先清除殘渣"}, {"stageTitle": "第三關｜分類判斷", "area": "分類神殿守門人出現。", "type": "分類", "icon": "♻️", "hero": "勇者：讓我證明我會分類！", "enemy": "守門人：選錯就無法通過！", "question": "乾淨紙餐盒應？", "choices": [{"key": "A", "text": "一般垃圾"}, {"key": "B", "text": "紙容器回收"}, {"key": "C", "text": "紙類回收"}], "answer": "B", "tip": "有特殊膠膜需以紙容器回收"}, {"stageTitle": "第四關｜進階挑戰", "area": "外送驛站被油污籠罩。", "type": "判斷", "icon": "🛵", "hero": "勇者：這種狀況要判斷！", "enemy": "油污：你分得清嗎？", "question": "少量油漬？", "choices": [{"key": "A", "text": "直接回收"}, {"key": "B", "text": "沖洗後紙容器回收"}, {"key": "C", "text": "一般垃圾"}], "answer": "B", "tip": "應去除油污避免影響回收品質"}, {"stageTitle": "第五關｜觀念試煉", "area": "圖書館出現知識之靈。", "type": "觀念", "icon": "📘", "hero": "勇者：我要理解原因！", "enemy": "知識之靈：答對才是真懂！", "question": "餐盒為何不能當作紙類回收", "choices": [{"key": "A", "text": "太重"}, {"key": "B", "text": "特殊材質"}, {"key": "C", "text": "沒價值"}], "answer": "B", "tip": "紙餐盒塑膠淋膜需特殊處理"}, {"stageTitle": "第六關｜分離任務", "area": "分類站出現分離獸。", "type": "流程", "icon": "🍱", "hero": "勇者：不同材質要分開！", "enemy": "分離獸：混在一起就完了！", "question": "餐盒與塑膠蓋應？", "choices": [{"key": "A", "text": "一起回收"}, {"key": "B", "text": "分開處理"}, {"key": "C", "text": "丟垃圾"}], "answer": "B", "tip": "材質不同"}, {"stageTitle": "第七關｜湯汁危機", "area": "廚餘區變得更危險。", "type": "判斷", "icon": "🍱", "hero": "勇者：不能讓殘渣污染！", "enemy": "殘渣怪：留下我吧！", "question": "裝湯紙盒應？", "choices": [{"key": "A", "text": "紙類回收"}, {"key": "B", "text": "沖水後紙容器回收"}, {"key": "C", "text": "一般垃圾"}], "answer": "B", "tip": "污染嚴重"}, {"stageTitle": "第八關｜早餐任務", "area": "外送區要如何減少紙餐盒怪。", "type": "情境", "icon": "🍱", "hero": "勇者：這裡的紙餐盒怪太多了！", "enemy": "紙餐盒怪：看你還能拿出什麼武器？", "question": "外帶早餐可以如何減少垃圾量?", "choices": [{"key": "A", "text": "使用塑膠袋"}, {"key": "B", "text": "自備環保餐盒"}, {"key": "C", "text": "索取竹筷塑膠湯匙"}], "answer": "A", "tip": "自備循環餐盒可減少垃圾量"}, {"stageTitle": "第九關｜公司任務", "area": "整理站出現守衛。", "type": "情境", "icon": "📦", "hero": "勇者：該壓嗎？", "enemy": "守衛：看你判斷！", "question": "便當乾淨盒？", "choices": [{"key": "A", "text": "回收"}, {"key": "B", "text": "一般垃圾"}, {"key": "C", "text": "丟地上"}], "answer": "A", "tip": "可回收"}, {"stageTitle": "最終關｜勇者試煉", "area": "你來到最終聖殿，環保之王現身。", "type": "綜合", "icon": "👑", "hero": "勇者：我已擁有環保之力", "enemy": "環保之王：請讓我看看你所得到的力量！", "question": "勇者可以如何用回收保護地球?", "choices": [{"key": "A", "text": "增加污染"}, {"key": "B", "text": "減少垃圾落實資源循環"}, {"key": "C", "text": "可以侵占動物生存空間"}], "answer": "B", "tip": "讓資源循環再利用減少垃圾產生"}];
let i = 0, life = 5, score = 0, locked=false;

const stageText = document.getElementById("stageText");
const lifeText = document.getElementById("lifeText");
const scoreText = document.getElementById("scoreText");
const sceneName = document.getElementById("sceneName");
const sceneIcon = document.getElementById("sceneIcon");
const heroBubble = document.getElementById("heroBubble");
const enemyBubble = document.getElementById("enemyBubble");
const questionText = document.getElementById("questionText");
const choicesBox = document.getElementById("choicesBox");
const feedbackBox = document.getElementById("feedbackBox");
const nextBtn = document.getElementById("nextBtn");

function render(){
  const s = STAGES[i];
  locked=false;
  stageText.textContent = `🗺️ 第 ${i+1} 關 / ${STAGES.length}`;
  lifeText.textContent = life;
  scoreText.textContent = score;
  sceneName.textContent = s.stageTitle;
  sceneIcon.textContent = s.icon;
  heroBubble.textContent = s.hero;
  enemyBubble.textContent = s.enemy;
  questionText.textContent = s.question;
  feedbackBox.className="feedback";
  feedbackBox.textContent="";
  nextBtn.style.display="none";

  choicesBox.innerHTML="";
  s.choices.forEach(o=>{
    const b=document.createElement("button");
    b.className="choice";
    b.innerHTML=`<div class="meta"><div class="code">${o.key}</div><div class="label">${o.text}</div></div>`;
    b.onclick=()=>answer(o.key,b);
    choicesBox.appendChild(b);
  });
}

function answer(k,btn){
  if(locked) return;
  locked=true;
  const s=STAGES[i];
  const btns=[...document.querySelectorAll(".choice")];
  btns.forEach(b=>b.disabled=true);

  const correctBtn = btns.find(b=>b.textContent.includes(s.answer));
  if(k===s.answer){
    score+=10;
    btn.classList.add("correct");
    feedbackBox.className="feedback show good";
    feedbackBox.innerHTML="✅ 正確<br>"+s.tip;
  }else{
    life--;
    btn.classList.add("wrong");
    btns.forEach(b=>{ if(b.textContent.includes(s.answer)) b.classList.add("correct"); });
    feedbackBox.className="feedback show bad";
    feedbackBox.innerHTML="❌ 錯誤<br>正確答案："+s.answer+"<br>"+s.tip;
  }

  if(life<=0 || i===STAGES.length-1){
    setTimeout(()=>alert("🎉 冒險結束！"),300);
  }else{
    nextBtn.style.display="block";
  }
}

nextBtn.onclick=()=>{ i++; render(); };
render();
</script>
</body>
</html>
